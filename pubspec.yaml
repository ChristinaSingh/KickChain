name: kickchain
description: "Kickchain Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  responsive_sizer: ^3.3.1
  pin_code_fields: ^8.0.1
  google_nav_bar: ^5.0.7
  country_code_picker: ^3.1.0
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.14
  http: ^1.2.2
  cached_network_image: ^3.4.1
  fluttertoast: ^8.2.8
  share_plus: ^10.1.4
  image_picker: ^1.1.0
  image_cropper: ^9.0.0
  shimmer: ^3.0.0
  video_player: ^2.9.2
  simple_gradient_text: ^1.3.0
  smooth_page_indicator: ^1.2.0+3
  animated_text_kit: ^4.2.2
  permission_handler: ^12.0.1
  flutter_launcher_icons: ^0.14.1
  win32: ^5.10.0
  loading_animation_widget: ^1.3.0
  country_picker: ^2.0.26
  flutter_contacts: ^1.1.6
  url_launcher: ^6.3.1
  intl: ^0.20.1
  dio: ^5.9.0
  geocoding: ^2.0.5
  geolocator: ^13.0.3
  dotted_border: ^2.0.0
  file_picker: ^8.0.0
  get_storage: ^2.1.1
  curved_navigation_bar: ^1.0.6
  glass_kit: ^4.0.2
  qr_flutter: ^4.1.0
  reown_appkit: 1.5.0  # ← Locked to exact stable version
  webview_flutter_web: ^0.2.3+4
  flutter_web3: ^2.1.9
  connectivity_plus: 6.1.1
  firebase_messaging: ^15.0.3
  firebase_core: ^3.13.0
  flutter_local_notifications: ^18.0.0

dependency_overrides:
  connectivity_plus: 6.1.1
  reown_appkit: 1.5.0  # ← Force this exact version

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
